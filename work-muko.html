    <header>
        <a href="index.html" class="logo"><p>Song's portfolio</p></a>
        <nav>
            <div class="menuToggle" onclick="toggleMenu();"></div>
            <ul class="navigation">
                <li><a href="index.html#work" onclick="toggleMenu();">Work</a></li>
                <li><a href="index.html#about" onclick="toggleMenu();">About</a></li>
            </ul>
        </nav>
    </header> 

    <section class="work" id="work">
        <h2>MUKO</h2> 
        <p>UX/UI Design/ Mobile Application design/ Website design</p>

        <div class="work-wrapper">
            <div class="work-img-wrapper">
                <img src="img/muko_detail.png" alt="muko-detail">
            </div>
        </div>

    </section>

    <script type="text/javascript">
        window.addEventListener('scroll', function(){
            const header = document.querySelector('header');
            header.classList.toggle("sticky", window.scrollY > 0);
        });
        function toggleMenu(){
            const menuToggle = document.querySelector('.menuToggle');
            const navigation = document.querySelector('.navigation');
            menuToggle.classList.toggle('active');
            navigation.classList.toggle('active');
        }
    </script>
    <script type="text/javascript">
        $(document).ready(function(){
            $('.list').click(function(){
                const value = $(this).attr('data-filter');
                if(value == 'all'){
                    $('.itemBox').fadeIn();
                }else{
                    $('.itemBox').not('.'+value).fadeOut(10);
                    $('.itemBox').filter('.'+value).fadeIn();
                }
            })
        })
        $('.list').click(function(){
            $(this).addClass('active').siblings().removeClass('active');
        })
        $(document).ready(function(){
            $('.card').on('mouseenter', function(e){
                x = e.pageX - $(this).offset().left,
                y = e.pageY - $(this).offset().top;
                $(this).find('span').css({top:y, left:x}) 
            })
            $('.card').on('mouseout', function(e){
                x = e.pageX - $(this).offset().left,
                y = e.pageY - $(this).offset().top;
                $(this).find('span').css({top:y, left:x}) 
            })
        })
    </script>
